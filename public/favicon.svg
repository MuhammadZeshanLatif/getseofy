<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" role="img" aria-label="GetSeofy">
  <defs>
    <linearGradient id="bg" x1="50%" y1="0%" x2="50%" y2="100%">
      <stop offset="0%" stop-color="#1b2d48"/>
      <stop offset="45%" stop-color="#0f141c"/>
      <stop offset="100%" stop-color="#06080c"/>
    </linearGradient>
    <radialGradient id="shine" cx="28%" cy="22%" r="55%">
      <stop offset="0%" stop-color="#5b8def" stop-opacity="0.45"/>
      <stop offset="70%" stop-color="#5b8def" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#5b8def" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="rim" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#9ebfff"/>
      <stop offset="40%" stop-color="#5b8def"/>
      <stop offset="100%" stop-color="#8ef0c1"/>
    </linearGradient>
    <linearGradient id="mark" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="55%" stop-color="#d4e4ff"/>
      <stop offset="100%" stop-color="#8ef0c1"/>
    </linearGradient>
  </defs>
  <!-- Squircle -->
  <rect width="32" height="32" rx="10" fill="url(#bg)"/>
  <rect width="32" height="32" rx="10" fill="url(#shine)"/>
  <rect x="1.15" y="1.15" width="29.7" height="29.7" rx="8.85" fill="none" stroke="url(#rim)" stroke-width="1.15" opacity="0.92"/>
  <!-- GS wordmark (bold, tuned for 16×16 clarity) -->
  <text
    x="16"
    y="21.8"
    text-anchor="middle"
    font-family="Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
    font-size="12.5"
    font-weight="900"
    letter-spacing="-0.11em"
    fill="url(#mark)"
  >GS</text>
  <!-- Accent underline / growth tick -->
  <path
    d="M9 24.25h8.5l2.2-2.1 2.8 2.1H23"
    fill="none"
    stroke="url(#rim)"
    stroke-width="1.35"
    stroke-linecap="round"
    stroke-linejoin="round"
    opacity="0.88"
  />
  <!-- Signal dot -->
  <circle cx="25" cy="8" r="2" fill="#8ef0c1"/>
  <circle cx="25" cy="8" r="2.8" fill="none" stroke="#8ef0c1" stroke-opacity="0.35" stroke-width="1"/>
</svg>
